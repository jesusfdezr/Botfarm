<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotFarm - Twitter Spam Reporter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #e7e9ea;
    }

    .header {
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(29, 155, 240, 0.2);
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #1d9bf0 0%, #7856ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: #71767b;
    }

    .warning {
      background: rgba(255, 145, 0, 0.1);
      border: 1px solid rgba(255, 145, 0, 0.3);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 16px;
      font-size: 11px;
      color: #ff9100;
    }

    .warning strong {
      display: block;
      margin-bottom: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
      color: #1d9bf0;
    }

    .stat-card .label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #71767b;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1d9bf0 0%, #7856ff 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(29, 155, 240, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e7e9ea;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-danger {
      background: linear-gradient(135deg, #f42128 0%, #ff6b6b 100%);
      color: white;
    }

    .btn-danger:hover {
      box-shadow: 0 4px 12px rgba(244, 33, 40, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .accounts-list {
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 12px;
    }

    .account-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .account-item .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .account-item .info {
      flex: 1;
    }

    .account-item .username {
      font-weight: 600;
      font-size: 13px;
      color: #1d9bf0;
    }

    .account-item .spam-score {
      font-size: 10px;
      color: #ff9100;
      margin-top: 2px;
    }

    .account-item .actions {
      display: flex;
      gap: 4px;
    }

    .account-item .actions button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .account-item .actions .report {
      background: rgba(255, 145, 0, 0.2);
      color: #ff9100;
    }

    .account-item .actions .block {
      background: rgba(244, 33, 40, 0.2);
      color: #f42128;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #71767b;
      font-size: 12px;
    }

    .spinner {
      border: 2px solid rgba(29, 155, 240, 0.2);
      border-top-color: #1d9bf0;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #71767b;
      font-size: 12px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .toggle-container label {
      font-size: 12px;
      font-weight: 600;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle.active {
      background: #1d9bf0;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle.active::after {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ BotFarm Reporter</h1>
    <p>Detecta y bloquea spam bots en X/Twitter</p>
  </div>

  <div class="warning">
    <strong>⚠️ ADVERTENCIA</strong>
    Usa esta herramienta solo para spam/harassment legítimo. Revisa manualmente antes de reportear.
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="value" id="scanned-count">0</div>
      <div class="label">Escaneados</div>
    </div>
    <div class="stat-card">
      <div class="value" id="reported-count">0</div>
      <div class="label">Reporteados</div>
    </div>
    <div class="stat-card">
      <div class="value" id="blocked-count">0</div>
      <div class="label">Bloqueados</div>
    </div>
  </div>

  <div class="toggle-container">
    <label>Auto-add action buttons</label>
    <div class="toggle" id="autoAddToggle"></div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="scanBtn">
      🔍 Escear notificaciones
    </button>
    <button class="btn btn-secondary" id="refreshStatsBtn">
      📊 Actualizar stats
    </button>
  </div>

  <div id="accountsContainer" class="accounts-list">
    <div class="empty-state">
      Sin cuentas escaneadas aún.<br>
      Haz clic en "Escanear notificaciones" para comenzar.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
